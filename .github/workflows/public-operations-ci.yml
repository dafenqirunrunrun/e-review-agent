name: Public Operations CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  public-operations-phase3:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PUBLIC_COMPOSE_PROJECT: ereview-public-ops-${{ github.run_id }}
      PUBLIC_BACKEND_URL: http://127.0.0.1:8080
      PUBLIC_AI_URL: http://127.0.0.1:8008
      PUBLIC_ADMIN_URL: http://127.0.0.1:8081
      PUBLIC_CUSTOMER_URL: http://127.0.0.1:8082
      PUBLIC_CI_ADMIN_USERNAME: ci_public_admin
      PUBLIC_CI_ADMIN_PASSWORD: public_ci_admin_123
      PUBLIC_CI_USER_USERNAME: ci_public_user
      PUBLIC_CI_USER_PASSWORD: public_ci_user_123
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Compose build
        run: docker compose -f compose.public.yml build

      - name: Filesystem security scan
        run: |
          mkdir -p artifacts/operations/v1.9.0-phase3/security
          trivy fs --ignore-unfixed --format json --output artifacts/operations/v1.9.0-phase3/security/filesystem.json .

      - name: Image security scans
        run: |
          mkdir -p artifacts/operations/v1.9.0-phase3/security
          for image in \
            e-review-agent-public-backend:v190-phase2 \
            e-review-agent-public-ai-service:v190-phase2 \
            e-review-agent-public-admin:v190-phase2 \
            e-review-agent-public-customer:v190-phase2
          do
            safe_name="$(echo "$image" | tr '/:' '__')"
            trivy image --ignore-unfixed --format json --output "artifacts/operations/v1.9.0-phase3/security/${safe_name}.json" "$image"
          done

      - name: Container security gate
        run: python scripts/ci/public_container_security_gate.py

      - name: Generate public SBOM
        run: python scripts/ci/generate_public_sbom.py

      - name: Start public runtime
        run: docker compose -p "$PUBLIC_COMPOSE_PROJECT" -f compose.public.yml up -d

      - name: Wait for service health
        run: python scripts/ci/wait_for_public_runtime.py

      - name: Business smoke E2E
        run: python scripts/ci/public_business_smoke.py

      - name: Observability smoke
        run: python scripts/ci/public_observability_smoke.py

      - name: Backup restore smoke
        run: python scripts/ci/public_backup_restore_smoke.py

      - name: Rollback smoke
        run: python scripts/ci/public_rollback_smoke.py

      - name: Phase 3 operations gate
        run: python scripts/readiness/run_public_ops_phase3_gate.py

      - name: Collect operations diagnostics
        if: failure()
        run: |
          docker compose -p "$PUBLIC_COMPOSE_PROJECT" -f compose.public.yml ps || true
          docker compose -p "$PUBLIC_COMPOSE_PROJECT" -f compose.public.yml logs --no-color || true

      - name: Upload operations evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-operations-phase3-evidence
          path: artifacts/
          if-no-files-found: ignore

      - name: Cleanup public runtime
        if: always()
        run: docker compose -p "$PUBLIC_COMPOSE_PROJECT" -f compose.public.yml down -v --remove-orphans
