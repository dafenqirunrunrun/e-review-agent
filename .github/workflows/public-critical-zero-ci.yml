name: Public Critical Zero CI

on:
  pull_request:
    branches:
      - main
      - experiment/v1.9.0-public-ops-phase3
  push:
    branches:
      - main
  workflow_dispatch:

env:
  TRIVY_VERSION: "0.72.0"

jobs:
  public-critical-zero-phase4a:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pinned Trivy
        run: |
          set -euo pipefail
          wget -q "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.deb"
          sudo dpkg -i "trivy_${TRIVY_VERSION}_Linux-64bit.deb"
          trivy --version

      - name: Build public images without cache
        run: docker compose -f compose.public.yml build --no-cache

      - name: Scan filesystem and public images
        run: |
          set -euo pipefail
          mkdir -p artifacts/operations/v1.9.0-phase3/security
          trivy fs --offline-scan --scanners vuln --ignore-unfixed --vex docs/security/public_vex.openvex.json --format json --output artifacts/operations/v1.9.0-phase3/security/filesystem.json .
          for image in \
            e-review-agent-public-backend:v190-phase2 \
            e-review-agent-public-ai-service:v190-phase2 \
            e-review-agent-public-admin:v190-phase2 \
            e-review-agent-public-customer:v190-phase2
          do
            safe_name="$(echo "$image" | tr '/:' '__')"
            trivy image --offline-scan --scanners vuln --ignore-unfixed --vex docs/security/public_vex.openvex.json --format json --output "artifacts/operations/v1.9.0-phase3/security/${safe_name}.json" "$image"
          done

      - name: Container risk semantics gate
        run: python scripts/ci/public_container_security_gate.py

      - name: Critical zero gate
        run: python scripts/ci/public_critical_zero_gate.py

      - name: Generate public SBOM
        run: python scripts/ci/generate_public_sbom.py

      - name: Upload critical zero evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-critical-zero-phase4a-evidence
          path: artifacts/
          if-no-files-found: ignore
