name: Public Security CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  public-container-security:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Build public images
        run: docker compose -f compose.public.yml build

      - name: Scan filesystem and public images
        run: |
          mkdir -p artifacts/operations/v1.9.0-phase3/security
          trivy fs --ignore-unfixed --format json --output artifacts/operations/v1.9.0-phase3/security/filesystem.json .
          for image in \
            e-review-agent-public-backend:v190-phase2 \
            e-review-agent-public-ai-service:v190-phase2 \
            e-review-agent-public-admin:v190-phase2 \
            e-review-agent-public-customer:v190-phase2
          do
            safe_name="$(echo "$image" | tr '/:' '__')"
            trivy image --ignore-unfixed --format json --output "artifacts/operations/v1.9.0-phase3/security/${safe_name}.json" "$image"
          done

      - name: Container security gate
        run: python scripts/ci/public_container_security_gate.py

      - name: Generate public SBOM
        run: python scripts/ci/generate_public_sbom.py

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-security-phase3-evidence
          path: artifacts/operations/v1.9.0-phase3/
          if-no-files-found: ignore
