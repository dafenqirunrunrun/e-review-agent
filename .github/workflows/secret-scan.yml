name: Secret Scan

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.24.3
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          mkdir -p /tmp/gitleaks
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/gitleaks
          echo "/tmp/gitleaks" >> "$GITHUB_PATH"
      - name: Run gitleaks workspace scan
        run: gitleaks detect --source . --no-git --redact --exit-code 1
