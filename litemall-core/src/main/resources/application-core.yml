litemall:
  # 开发者应该设置成自己的wx相关信息
  wx:
    app-id: ${LITEMALL_WX_APP_ID:change_me}
    app-secret: ${LITEMALL_WX_APP_SECRET:change_me}
    mch-id: ${LITEMALL_WX_MCH_ID:change_me}
    mch-key: ${LITEMALL_WX_MCH_KEY:change_me}
    notify-url: http://www.example.com/wx/order/pay-notify
    # 商户证书文件路径
    # 请参考“商户证书”一节 https://pay.weixin.qq.com/wiki/doc/api/wxa/wxa_api.php?chapter=4_3
    key-path: xxxxx
    # 消息推送配置token
    token:
    # 消息推送配置AesKey
    aes-key:

  #通知相关配置
  notify:
    mail:
      # 邮件通知配置,邮箱一般用于接收业务通知例如收到新的订单，sendto 定义邮件接收者，通常为商城运营人员
      enable: false
      host: smtp.exmail.qq.com
      username: ${LITEMALL_MAIL_USERNAME:change_me}
      password: ${LITEMALL_MAIL_PASSWORD:change_me}
      sendfrom: ${LITEMALL_MAIL_FROM:change_me@example.com}
      sendto: ${LITEMALL_MAIL_TO:change_me@example.com}
      port: 465
    # 短消息模版通知配置
    # 短信息用于通知客户，例如发货短信通知，注意配置格式；template-name，template-templateId 请参考 NotifyType 枚举值
    sms:
      enable: false
      # 如果是腾讯云短信，则设置active的值tencent
      # 如果是阿里云短信，则设置active的值aliyun
      active: tencent
      sign: litemall
      template:
      - name: paySucceed
        templateId: 156349
      - name: captcha
        templateId: 156433
      - name: ship
        templateId: 158002
      - name: refund
        templateId: 159447
      tencent:
        appid: ${LITEMALL_TENCENT_SMS_APP_ID:0}
        appkey: ${LITEMALL_TENCENT_SMS_APP_KEY:change_me}
      aliyun:
        regionId: xxx
        accessKeyId: ${LITEMALL_ALIYUN_SMS_ACCESS_KEY_ID:change_me}
        accessKeySecret: ${LITEMALL_ALIYUN_SMS_ACCESS_KEY_SECRET:change_me}

  # 快鸟物流查询配置
  express:
    enable: false
    appId: "${LITEMALL_EXPRESS_APP_ID:change_me}"
    appKey: "${LITEMALL_EXPRESS_APP_KEY:change_me}"
    vendors:
    - code: "ZTO"
      name: "中通快递"
    - code: "YTO"
      name: "圆通速递"
    - code: "YD"
      name: "韵达速递"
    - code: "YZPY"
      name: "邮政快递包裹"
    - code: "EMS"
      name: "EMS"
    - code: "DBL"
      name: "德邦快递"
    - code: "FAST"
      name: "快捷快递"
    - code: "ZJS"
      name: "宅急送"
    - code: "TNT"
      name: "TNT快递"
    - code: "UPS"
      name: "UPS"
    - code: "DHL"
      name: "DHL"
    - code: "FEDEX"
      name: "FEDEX联邦(国内件)"
    - code: "FEDEX_GJ"
      name: "FEDEX联邦(国际件)"

  # 对象存储配置
  storage:
    # 当前工作的对象存储模式，分别是local、aliyun、tencent、qiniu
    active: local
    # 本地对象存储配置信息
    local:
      storagePath: storage
      # 这个地方应该是wx模块的WxStorageController的fetch方法对应的地址
      address: http://localhost:8080/wx/storage/fetch/
    # 阿里云对象存储配置信息
    aliyun:
      endpoint: oss-cn-shenzhen.aliyuncs.com
      accessKeyId: ${LITEMALL_OSS_ACCESS_KEY_ID:change_me}
      accessKeySecret: ${LITEMALL_OSS_ACCESS_KEY_SECRET:change_me}
      bucketName: litemall
    # 腾讯对象存储配置信息
    # 请参考 https://cloud.tencent.com/document/product/436/6249
    tencent:
      secretId: ${LITEMALL_COS_SECRET_ID:change_me}
      secretKey: ${LITEMALL_COS_SECRET_KEY:change_me}
      region: ${LITEMALL_COS_REGION:ap-shanghai}
      bucketName: ${LITEMALL_COS_BUCKET:litemall-demo}
    # 七牛云对象存储配置信息
    qiniu:
      endpoint: http://pd5cb6ulu.bkt.clouddn.com
      accessKey: ${LITEMALL_QINIU_ACCESS_KEY:change_me}
      secretKey: ${LITEMALL_QINIU_SECRET_KEY:change_me}
      bucketName: litemall
